name: Sync Docs

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Sync in-repo docs (README.md)
        run: node scripts/sync-repo-docs.mjs

      - name: Sync DeepWiki
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: node scripts/sync-deepwiki.mjs

      - name: Generate navigation
        run: node scripts/generate-nav.mjs

      - name: Fetch OpenAPI spec
        env:
          OPENAPI_URL: ${{ secrets.OPENAPI_URL }}
        run: node scripts/fetch-openapi.mjs

      - name: Commit synced content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/ src/generated-nav.ts apis/openapi.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync docs, DeepWiki, and OpenAPI spec [skip ci]"
            git push
          fi
