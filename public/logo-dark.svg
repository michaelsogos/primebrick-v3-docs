<svg xmlns="http://www.w3.org/2000/svg" width="170" height="32" viewBox="0 0 170 32" fill="none">
  <defs>
    <linearGradient id="pb-text-grad-zudoku-dark" x1="36" y1="0" x2="170" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d1d5db"/>
      <stop offset="1" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>
  <!-- 2x2 modular brick grid (32x32 icon area), grey -> black palette.
       On dark backgrounds the bricks keep the same grey scale; text is lighter for contrast. -->
