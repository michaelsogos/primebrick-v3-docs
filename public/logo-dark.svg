  <rect x="17" y="2"  width="13" height="13" rx="2.5" fill="#6b7280"/>
  <rect x="2"  y="17" width="13" height="13" rx="2.5" fill="#374151"/>
  <rect x="17" y="17" width="13" height="13" rx="2.5" fill="#1f2937"/>
  <circle cx="8.5" cy="8.5" r="2" fill="#ffffff"/>
  <text x="40" y="23" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="700" fill="url(#pb-text-grad-zudoku-dark)" letter-spacing="-0.3">PrimeBrick</text>
</svg>
